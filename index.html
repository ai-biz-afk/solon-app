<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        .header-title { font-size:18px; font-weight:700; margin-bottom:4px; }
        .header-subtitle { font-size:13px; opacity:0.9; }
        #chatArea { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; background:#F9FAFB; }
        .empty-state { text-align:center; padding:40px 20px; color:#6B7280; }
        .tmpl-row { padding:8px 12px; background:white; border-top:1px solid #E5E7EB; overflow-x:auto; white-space:nowrap; flex-shrink:0; }

        #sendBtn { width:44px; height:44px; border-radius:50%; border:none; background:#4F46E5; color:white; font-size:20px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        #sendBtn:disabled { opacity:0.5; }
        .reset-row { text-align:center; padding:4px; background:white; flex-shrink:0; }
        .reset-btn { font-size:11px; color:#9CA3AF; background:none; border:none; cursor:pointer; padding:4px; }
    </style>
</head>

    </div>

// キーワードでカテゴリーを判定
function getRelevantData(question) {
    const q = question;
    let categories = ['基本'];
 
    if (/手当|給与|給料|資格|宅建|取引士|電気工事|測量士|石綿|kintone|DX|通勤|子供|一人暮らし|紹介料|勤続|奨学金|管理職/.test(q)) categories.push('手当');
    if (/賞与|ボーナス|評価|成長支援|号棒|昇給/.test(q)) categories.push('賞与');
    if (/採用|採用基準|新卒|中途|パート|契約社員|面接|育成|研修/.test(q)) categories.push('採用');
    if (/休暇|休み|有給|リフレッシュ|結婚|出産|忌引|退職|直行|直帰|遅刻|欠勤|働き方|残業|勤務時間/.test(q)) categories.push('休暇働き方');
    if (/クレーム|苦情|お客様対応|トラブル/.test(q)) categories.push('クレーム');
    if (/始末書|反省文|ペナルティ|禁止|規則|ルール/.test(q)) categories.push('始末書反省文');
    if (/健康|検診|インフルエンザ|事故|運転|車|保険/.test(q)) categories.push('健康運転');
    if (/DX|アプリ|AI|デジタル|懇親会|ランチ|アワード|表彰|出張|旅費|制度|文化/.test(q)) categories.push('DX社内制度');
 
    // 重複を除去して結合
    const unique = [...new Set(categories)];
    return unique.map(c => DATA[c]).join('\n\n');
}
 
function getApiKey() { return localStorage.getItem("solon_api_key") || ""; }
 
let conv = [];
let msgs = [];
 
function setQ(text) {
    document.getElementById("situation").value = text;
    document.getElementById("situation").focus();
}
 
function renderMsgs() {
    const area = document.getElementById("chatArea");
    if (!msgs.length) {
        area.innerHTML = "<div class='empty-state'><div style='font-size:40px;margin-bottom:12px;'>💬</div><div>下の入力欄から質問してください</div></div>";
        return;
    }
    area.innerHTML = msgs.map(m => {
        if (m.role === "user") return `<div style="display:flex;justify-content:flex-end;margin-bottom:12px;"><div style="background:#4F46E5;color:white;padding:10px 14px;border-radius:18px 18px 4px 18px;max-width:80%;font-size:14px;line-height:1.6;">${esc(m.text)}</div></div>`;
        if (m.role === "assistant") return `<div style="display:flex;margin-bottom:12px;gap:8px;"><div style="width:32px;height:32px;background:#4F46E5;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;flex-shrink:0;">社</div><div style="background:white;border:1px solid #E5E7EB;padding:10px 14px;border-radius:18px 18px 18px 4px;max-width:80%;font-size:14px;line-height:1.8;word-wrap:break-word;">${formatText(m.text)}</div></div>`;
        return `<div style="text-align:center;color:#EF4444;font-size:12px;margin:8px 0;">${esc(m.text)}</div>`;
    }).join("");
    area.scrollTop = area.scrollHeight;
}
 
async function send() {
    const el = document.getElementById("situation");
    const q = el.value.trim();
    if (!q) return;
 
    let apiKey = getApiKey();
    if (!apiKey) {
        const key = prompt("初回設定：APIキーを入力してください\n（sk-ant- で始まる文字列）");
        if (!key || !key.startsWith("sk-ant-")) { alert("APIキーが正しくありません。"); return; }
        localStorage.setItem("solon_api_key", key);
        apiKey = key;
    }
 
    el.value = "";
    el.style.height = "44px";
 
    msgs.push({ role: "user", text: q });
    conv.push({ role: "user", content: q });
    renderMsgs();
 
    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    btn.innerHTML = "⏳";
 
    try {
        const relevantData = getRelevantData(q);
        const recentConv = conv.slice(-8);
 
        const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": apiKey,
                "anthropic-version": "2023-06-01",
                "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 800,
                system: `あなたは株式会社ソロンの社長・平川浩美です。以下の経営計画書に基づいて、社員の質問に正確に答えてください。数字は必ず正確に伝えてください。会話の流れを踏まえて自然に対話してください。回答には#や*などのマークダウン記号は一切使わないでください。箇条書きは「・」を使ってください。\n\n${relevantData}`,
                messages: recentConv
            })
        });
 
        if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "エラー"); }
        const data = await res.json();
        const answer = data.content[0].text;
 
        conv.push({ role: "assistant", content: answer });
        msgs.push({ role: "assistant", text: answer });
        renderMsgs();
 
    } catch(e) {
        msgs.push({ role: "error", text: "エラー: " + e.message });
        renderMsgs();
    } finally {
        btn.disabled = false;
        btn.innerHTML = "&#10148;";
    }
}
 
function reset() {
    if (confirm("会話をリセットしますか？")) { conv = []; msgs = []; renderMsgs(); }
}
 
function esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }
 
// マークダウン記号を除去して読みやすくする
function formatText(t) {
    return esc(t)
        .replace(/#{1,6}\s?/g, '')           // ## などを削除
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')  // **太字** を<strong>に
        .replace(/\*(.*?)\*/g, '$1')          // *斜体* を削除
        .replace(/`(.*?)`/g, '$1')            // `コード` を削除
        .replace(/\n/g, '<br>');              // 改行を<br>に
}
 
renderMsgs();
</script>
</body>
</html>
