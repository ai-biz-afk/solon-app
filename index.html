<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="社長クローン">
    <title>経営計画書</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --primary-dark: #4338CA;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: #fff; color: var(--gray-900);
        }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; padding: max(env(safe-area-inset-top), 16px) 16px 20px; flex-shrink: 0;
        }
        .header-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .header-subtitle { font-size: 13px; opacity: 0.9; }
        .tabs {
            display: flex; gap: 8px; padding: 12px 16px;
            background: var(--gray-50); border-bottom: 1px solid var(--gray-200); flex-shrink: 0;
        }
        .tab-btn {
            flex-shrink: 0; padding: 8px 16px; border-radius: 8px;
            border: 1px solid transparent; font-size: 13px; font-weight: 600;
            background: white; color: var(--gray-700); cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: white; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-panel.active { display: flex; }
        .scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
        }
        label { display: block; font-weight: 600; color: var(--gray-800); margin-bottom: 8px; font-size: 14px; }
        textarea {
            width: 100%; padding: 12px; border: 1px solid var(--gray-300);
            border-radius: 10px; font-size: 14px; font-family: inherit;
            min-height: 100px; resize: none; background: white; color: var(--gray-900);
        }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .templates { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .template-btn {
            padding: 10px; border: 1px solid var(--gray-300); border-radius: 8px;
            background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--gray-700);
        }
        .template-btn:active { background: var(--gray-100); }
        .info-box {
            background: rgba(79,70,229,0.1); border-left: 3px solid var(--primary);
            padding: 12px; border-radius: 8px; font-size: 13px;
            color: var(--gray-700); line-height: 1.6; margin-top: 12px;
        }
        .actions {
            display: flex; gap: 10px; padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: white; border-top: 1px solid var(--gray-200); flex-shrink: 0;
        }
        .btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); }
        .response-card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .response-label { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .response-text { font-size: 14px; line-height: 1.8; color: var(--gray-800); white-space: pre-wrap; word-wrap: break-word; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-500); }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="header-title">経営計画書</div>
        <div class="header-subtitle">株式会社ソロン 第18期経営計画書対応</div>
    </div>
    <div class="content">
        <!-- チャット表示エリア -->
        <div id="chatArea" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;background:var(--gray-50);">
            <div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">💬</div><div>質問を入力して対話を始めましょう</div></div>
        </div>
 
        <!-- テンプレートボタン -->
        <div id="templateArea" style="padding:8px 16px;background:white;border-top:1px solid var(--gray-200);overflow-x:auto;white-space:nowrap;">
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('手当や給与について知りたい')">手当</button>
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('採用や人材育成について相談したい')">採用・人材</button>
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('クレーム対応の方針を知りたい')">クレーム</button>
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('休暇や働き方について知りたい')">休暇・働き方</button>
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('賞与の基準について知りたい')">賞与</button>
            <button class="template-btn" style="display:inline-block;margin-right:6px;white-space:nowrap;" onclick="useTemplate('経営方針について知りたい')">経営方針</button>
        </div>
 
        <!-- 入力エリア -->
        <div style="display:flex;gap:8px;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:white;border-top:1px solid var(--gray-200);flex-shrink:0;align-items:flex-end;">
            <textarea id="situation" placeholder="質問を入力..."
                style="flex:1;padding:10px 12px;border:1px solid var(--gray-300);border-radius:20px;font-size:14px;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.5;overflow-y:auto;"
                oninput="this.style.height='42px';this.style.height=Math.min(this.scrollHeight,120)+'px'"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askPresident();}"></textarea>
            <button id="askBtn" onclick="askPresident()"
                style="width:42px;height:42px;border-radius:50%;border:none;background:var(--primary);color:white;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                ➤
            </button>
        </div>
 
        <!-- リセットボタン -->
        <div style="text-align:center;padding:4px;padding-bottom:max(4px,env(safe-area-inset-bottom));background:white;">
            <button onclick="clearHistory()" style="font-size:11px;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:4px;">会話をリセット</button>
        </div>
    </div>
</div>

// キーワードでカテゴリーを判定
function getRelevantData(question) {
    const q = question;
    let categories = ['基本'];
 
    if (/手当|給与|給料|資格|宅建|取引士|電気工事|測量士|石綿|kintone|DX|通勤|子供|一人暮らし|紹介料|勤続|奨学金|管理職/.test(q)) categories.push('手当');
    if (/賞与|ボーナス|評価|成長支援|号棒|昇給/.test(q)) categories.push('賞与');
    if (/採用|採用基準|新卒|中途|パート|契約社員|面接|育成|研修/.test(q)) categories.push('採用');
    if (/休暇|休み|有給|リフレッシュ|結婚|出産|忌引|退職|直行|直帰|遅刻|欠勤|働き方|残業|勤務時間/.test(q)) categories.push('休暇働き方');
    if (/クレーム|苦情|お客様対応|トラブル/.test(q)) categories.push('クレーム');
    if (/始末書|反省文|ペナルティ|禁止|規則|ルール/.test(q)) categories.push('始末書反省文');
    if (/健康|検診|インフルエンザ|事故|運転|車|保険/.test(q)) categories.push('健康運転');
    if (/DX|アプリ|AI|デジタル|懇親会|ランチ|アワード|表彰|出張|旅費|制度|文化/.test(q)) categories.push('DX社内制度');
 
    // 重複を除去して結合
    const unique = [...new Set(categories)];
    return unique.map(c => DATA[c]).join('\n\n');
}
 
function getApiKey() {
    return localStorage.getItem('solon_api_key') || '';
}
 
// 会話履歴（API送信用）
let conversation = [];
// 表示用チャット
let chatMessages = [];
 
function switchTab(index) {}
 
function useTemplate(text) {
    document.getElementById('situation').value = text;
    document.getElementById('situation').focus();
}
 
function clearInput() {
    const el = document.getElementById('situation');
    el.value = '';
    el.style.height = '42px';
}
 
async function askPresident() {
    const situation = document.getElementById('situation').value.trim();
    if (!situation) { alert('質問を入力してください'); return; }
 
    let apiKey = getApiKey();
    if (!apiKey) {
        const key = prompt('初回設定：APIキーを入力してください\n（sk-ant- で始まる文字列）');
        if (!key || !key.startsWith('sk-ant-')) {
            alert('APIキーが正しくありません。');
            return;
        }
        localStorage.setItem('solon_api_key', key);
        apiKey = key;
    }
 
    const btn = document.getElementById('askBtn');
    btn.disabled = true;
    btn.textContent = '⏳';
 
    // ユーザーメッセージを表示
    chatMessages.push({ role: 'user', text: situation });
    renderChat();
    clearInput();
 
    // 会話履歴に追加
    conversation.push({ role: 'user', content: situation });
 
    // 会話が長くなりすぎないよう直近8件に制限
    const recentConversation = conversation.slice(-8);
 
    try {
        const relevantData = getRelevantData(situation);
 
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 800,
                system: `あなたは株式会社ソロンの社長・平川浩美です。以下の経営計画書に基づいて、社員の質問に正確に答えてください。数字は必ず正確に伝えてください。会話の流れを踏まえて自然に対話してください。\n\n${relevantData}`,
                messages: recentConversation
            })
        });
 
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || 'エラーが発生しました');
        }
 
        const data = await response.json();
        const answer = data.content[0].text;
 
        // 会話履歴に回答を追加
        conversation.push({ role: 'assistant', content: answer });
 
        // 表示用に追加
        chatMessages.push({ role: 'assistant', text: answer });
        renderChat();
 
    } catch (error) {
        chatMessages.push({ role: 'error', text: 'エラーが発生しました: ' + error.message });
        renderChat();
    } finally {
        btn.disabled = false;
        btn.textContent = '➤';
    }
}
 
function renderChat() {
    const area = document.getElementById('chatArea');
    if (chatMessages.length === 0) {
        area.innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">💬</div><div>質問を入力して対話を始めましょう</div></div>';
        return;
    }
 
    area.innerHTML = chatMessages.map(msg => {
        if (msg.role === 'user') {
            return `
                <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
                    <div style="background:var(--primary);color:white;padding:10px 14px;border-radius:16px 16px 4px 16px;max-width:80%;font-size:14px;line-height:1.6;">
                        ${escapeHtml(msg.text)}
                    </div>
                </div>`;
        } else if (msg.role === 'assistant') {
            return `
                <div style="display:flex;justify-content:flex-start;margin-bottom:12px;gap:8px;">
                    <div style="width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;flex-shrink:0;">社</div>
                    <div style="background:white;border:1px solid var(--gray-200);padding:10px 14px;border-radius:16px 16px 16px 4px;max-width:80%;font-size:14px;line-height:1.8;white-space:pre-wrap;word-wrap:break-word;">
                        ${escapeHtml(msg.text)}
                    </div>
                </div>`;
        } else {
            return `
                <div style="text-align:center;color:red;font-size:13px;margin:8px 0;">
                    ${escapeHtml(msg.text)}
                </div>`;
        }
    }).join('');
 
    // 最下部にスクロール
    area.scrollTop = area.scrollHeight;
}
 
function clearHistory() {
    if (confirm('会話をリセットしますか？')) {
        conversation = [];
        chatMessages = [];
        renderChat();
    }
}
 
function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}
 
renderChat();
</script>
