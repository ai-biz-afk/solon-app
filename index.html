<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="社長クローン">
    <title>社長のAIクローン</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --primary-dark: #4338CA;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: #fff; color: var(--gray-900);
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; padding: max(env(safe-area-inset-top), 16px) 16px 20px;
            flex-shrink: 0;
        }
        .header-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .header-subtitle { font-size: 13px; opacity: 0.9; }

        .tabs {
            display: flex; gap: 8px; padding: 12px 16px;
            background: var(--gray-50); border-bottom: 1px solid var(--gray-200); flex-shrink: 0;
        }
        .tab-btn {
            flex-shrink: 0; padding: 8px 16px; border-radius: 8px;
            border: 1px solid transparent; font-size: 13px; font-weight: 600;
            background: white; color: var(--gray-700); cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .tab-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-panel.active { display: flex; }

        .scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        label { display: block; font-weight: 600; color: var(--gray-800); margin-bottom: 8px; font-size: 14px; }

        textarea {
            width: 100%; padding: 12px; border: 1px solid var(--gray-300);
            border-radius: 10px; font-size: 14px; font-family: inherit;
            min-height: 100px; resize: none; background: white; color: var(--gray-900);
        }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

        .templates { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .template-btn {
            padding: 10px; border: 1px solid var(--gray-300); border-radius: 8px;
            background: white; font-size: 12px; font-weight: 600; cursor: pointer;
            color: var(--gray-700); text-align: center;
        }
        .template-btn:active { background: var(--gray-100); }

        .info-box {
            background: rgba(79,70,229,0.1); border-left: 3px solid var(--primary);
            padding: 12px; border-radius: 8px; font-size: 13px;
            color: var(--gray-700); line-height: 1.6; margin-top: 12px;
        }

        .actions {
            display: flex; gap: 10px; padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: white; border-top: 1px solid var(--gray-200); flex-shrink: 0;
        }

        .btn {
            flex: 1; padding: 14px; border-radius: 10px; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); }

        .response-card {
            background: white; border: 1px solid var(--gray-200);
            border-radius: 12px; padding: 14px; margin-bottom: 12px;
        }
        .response-label {
            font-size: 12px; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .response-text { font-size: 14px; line-height: 1.8; color: var(--gray-800); white-space: pre-wrap; word-wrap: break-word; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-500); }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="header-title">社長のAIクローン</div>
        <div class="header-subtitle">株式会社ソロン 第18期経営計画書対応</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">質問する</button>
        <button class="tab-btn" onclick="switchTab(1)">履歴</button>
    </div>

    <div class="content">
        <div class="tab-panel active" id="panel-0">
            <div class="scroll">
                <label>状況や質問を入力</label>
                <textarea id="situation" placeholder="例：宅地建物取引士の毎月の手当はいくらですか？"></textarea>

                <div style="margin-top:12px;font-size:12px;font-weight:600;color:var(--gray-600);">テンプレート</div>
                <div class="templates">
                    <button class="template-btn" onclick="useTemplate('宅地建物取引士の手当について教えてください')">手当について</button>
                    <button class="template-btn" onclick="useTemplate('採用や人材育成について相談したい')">人材について</button>
                    <button class="template-btn" onclick="useTemplate('営業の優先順位をつけたい')">営業活動</button>
                    <button class="template-btn" onclick="useTemplate('新規事業について判断したい')">新規事業</button>
                </div>

                <div class="info-box">
                    💡 経営計画書の内容を参照して、社長の方針に基づいた正確な回答をします。
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="askBtn" onclick="askPresident()">社長に聞く</button>
                <button class="btn btn-secondary" onclick="clearInput()">クリア</button>
            </div>
        </div>

        <div class="tab-panel" id="panel-1">
            <div class="scroll" id="historyArea">
                <div class="empty-state">
                    <div style="font-size:40px;margin-bottom:12px;">📝</div>
                    <div>まだ質問がありません</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="clearHistory()">履歴をクリア</button>
            </div>
        </div>
    </div>
</div>

<script>
    const PLAN_DATA = `
【株式会社ソロン 第18期経営計画書】

【経営理念】
問題解決のプロフェッショナル。社会・個人に関する全ての『こまった』を『よかった』へ

【経営ビジョン（３年後）】
・不動産：佐賀県・久留米市で１番。地域販売物件シェア率が１番、Google口コミ件数が１番
・家電：協力業者で１番。お褫めの件数が１番
・測量：佐賀県で１番。無事故・無病気・無怪我件数が１番
・DXアプリ販売：日本で１番。不動産業務アプリ件数が１番、あったらいいなアプリ件数が１番

【経営方針】
1. 顧客や社会の『困った』を起点に、本質的な『よかった』を生み出す
2. 主体性と協働力を兼ね備えた『自走する組織』へ
3. 変化を前向きにとらえ、挑戦を恐れない文化を育てる

【経営メッセージ】
・完璧な計画よりも『迅速な実行』
・まず動く、すぐに試す、結果から学ぶ
・迷ったら前へ、一歩を早く踏み出す

【18期経営目標】
・売上高：10億500万円
・売上総利益額：4億2400万円
・営業利益：1億5500万円
・経常利益：1億4500万円

【主要施策】
・成長支援制度の確立（人事評価から成長支援へ）
・採用の強化（社員、契約社員、パート、副職パートへの募集）
・無駄な支出をしない（毎月の経費見直し）
・1件当たりの粗利単価引き上げ
・長期追客DMからの戻り率引き上げ
・買取件数増加
・DX：不動産アプリ開発・販売強化

【手当】
●宅地建物取引士
・店舗専任登録し賠償責任保険加盟の翌月以降
・売買契約後にお祝い金支給（受験回数3回まで対象）
  受験1回目：200,000円　受験2回目：100,000円　受験3回目：50,000円
・お祝い金受給の翌月から毎月5,000円を支給

●資格手当
・1種電気工事士：お祝い金200,000円、翌月から毎月5,000円
・2種電気工事士：お祝い金50,000円
・損害保険募集人：一時金5,000円
・住宅ローンアドバイザー：一時金5,000円
・Webクリエイター認定：一時金10,000円
・kintoneアソシエイト認定：受験料支給＋翌月から毎月5,000円
・kintoneアプリデザイン認定：一時金20,000円＋翌月から毎月5,000円
・DXアドバイザー：一時金10,000円＋翌月から毎月5,000円
・測量士：受験1回目200,000円、2回目100,000円、3回目50,000円＋翌月から毎月10,000円
・測量士補：一時金20,000円＋翌月から毎月5,000円
・石綿調査士：一時金30,000円＋翌月から毎月5,000円

●管理職手当（毎月）
・5G：40,000円
・家電4G：30,000円
・不動産4G：20,000円
・店長：20,000円
・マネージャー・測量責任者・経理責任者：20,000円

●その他の手当
・一人暮らし（3年間）：15,000円/月
・通勤（月20日以上出勤）：5,000円/月
・私有車使用：15,000円/月＋ガソリン支給
・子供手当（18歳まで）：1人10,000円、2人15,000円、3人18,000円、4人20,000円/月

【採用方針】
・経営理念を共有できる人を採用
・転職4回以上は原則不採用
・6ヶ月間は契約社員として採用後、社員登用

【クレーム対応方針】
・クレーム対応は全業務を止めて最優先
・第一報は30分以内
・当事者とリーダーが当日中にお詫び訪問

【働き方】
・帰社時間は19時を超えない
・残業は月45時間以内
・社内コミュニケーションは8時〜20時
    `;

    // APIキーはlocalStorageから取得
    function getApiKey() {
        return localStorage.getItem('solon_api_key') || '';
    }

    let history = [];

    function switchTab(index) {
        document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('panel-' + index).classList.add('active');
        document.querySelectorAll('.tab-btn')[index].classList.add('active');
    }

    function useTemplate(text) {
        document.getElementById('situation').value = text;
    }

    function clearInput() {
        document.getElementById('situation').value = '';
    }

    async function askPresident() {
        const situation = document.getElementById('situation').value.trim();
        if (!situation) { alert('質問を入力してください'); return; }

        const btn = document.getElementById('askBtn');
        btn.disabled = true;
        btn.textContent = '回答を取得中...';

        const apiKey = getApiKey();
        if (!apiKey) {
            const key = prompt('初回設定：APIキーを入力してください\n（sk-ant- で始まる文字列）');
            if (!key || !key.startsWith('sk-ant-')) {
                alert('APIキーが正しくありません。');
                btn.disabled = false;
                btn.textContent = '社長に聞く';
                return;
            }
            localStorage.setItem('solon_api_key', key);
        }

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': getApiKey(),
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: `あなたは株式会社ソロンの社長・平川浩美です。以下の経営計画書に基づいて、社員の質問に正確に答えてください。数字は必ず正確に伝えてください。\n\n${PLAN_DATA}`,
                    messages: [{ role: 'user', content: situation }]
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `エラー ${response.status}`);
            }

            const data = await response.json();
            const answer = data.content[0].text;

            history.unshift({
                timestamp: new Date().toLocaleString('ja-JP'),
                question: situation,
                answer: answer
            });

            if (history.length > 30) history.pop();
            try { localStorage.setItem('appHistory', JSON.stringify(history)); } catch(e) {}

            clearInput();
            displayHistory();
            switchTab(1);

        } catch (error) {
            alert('エラーが発生しました:\n' + error.message);
        } finally {
            btn.disabled = false;
            btn.textContent = '社長に聞く';
        }
    }

    function displayHistory() {
        const area = document.getElementById('historyArea');
        if (history.length === 0) {
            area.innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">📝</div><div>まだ質問がありません</div></div>';
            return;
        }
        area.innerHTML = history.map(item => `
            <div style="margin-bottom:16px;">
                <div style="font-size:12px;color:var(--gray-500);margin-bottom:8px;">${item.timestamp}</div>
                <div style="background:var(--gray-50);padding:12px;border-radius:8px;margin-bottom:8px;">
                    <div style="font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:4px;">Q</div>
                    <div style="font-size:13px;color:var(--gray-700);">${escapeHtml(item.question)}</div>
                </div>
                <div class="response-card">
                    <div class="response-label">社長からの回答</div>
                    <div class="response-text">${escapeHtml(item.answer)}</div>
                </div>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm('履歴をすべて削除しますか？')) {
            history = [];
            try { localStorage.removeItem('appHistory'); } catch(e) {}
            displayHistory();
        }
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    try {
        const saved = localStorage.getItem('appHistory');
        if (saved) history = JSON.parse(saved);
    } catch(e) {}
    displayHistory();
</script>

</body>
</html>
