<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="経営計画書">
    <title>経営計画書</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif; background:#fff; }
        #app { width:100%; height:100%; display:flex; flex-direction:column; }
        .header { background:linear-gradient(135deg,#4F46E5,#6366F1); color:white; padding:max(env(safe-area-inset-top),16px) 16px 16px; flex-shrink:0; }
        .header-title { font-size:18px; font-weight:700; margin-bottom:4px; }
        .header-subtitle { font-size:12px; opacity:0.9; }
        .header-status { font-size:11px; opacity:0.8; margin-top:4px; display:flex; align-items:center; gap:8px; }
        .update-btn { font-size:11px; background:rgba(255,255,255,0.2); border:none; color:white; padding:2px 8px; border-radius:10px; cursor:pointer; }
        #chatArea { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; background:#F9FAFB; }
        .empty-state { text-align:center; padding:40px 20px; color:#6B7280; }
        .tmpl-row { padding:8px 12px; background:white; border-top:1px solid #E5E7EB; overflow-x:auto; white-space:nowrap; flex-shrink:0; }
        .tmpl-btn { display:inline-block; margin-right:6px; padding:6px 12px; border:1px solid #D1D5DB; border-radius:16px; background:white; font-size:12px; font-weight:600; cursor:pointer; color:#374151; white-space:nowrap; }
        .input-row { display:flex; gap:8px; padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom)); background:white; border-top:1px solid #E5E7EB; flex-shrink:0; align-items:flex-end; }
        #situation { flex:1; padding:10px 14px; border:1.5px solid #D1D5DB; border-radius:22px; font-size:14px; font-family:inherit; resize:none; min-height:44px; max-height:120px; line-height:1.5; overflow-y:auto; outline:none; }
        #situation:focus { border-color:#4F46E5; }
        #sendBtn { width:44px; height:44px; border-radius:50%; border:none; background:#4F46E5; color:white; font-size:20px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        #sendBtn:disabled { opacity:0.5; }
        .reset-row { text-align:center; padding:4px; background:white; flex-shrink:0; }
        .reset-btn { font-size:11px; color:#9CA3AF; background:none; border:none; cursor:pointer; padding:4px; }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="header-title">経営計画書</div>
        <div class="header-subtitle">株式会社ソロン 第18期経営計画書対応</div>
        <div class="header-status">
            <span id="docStatus">📄 読み込み中...</span>
            <button class="update-btn" onclick="updateDoc()">🔄 更新</button>
        </div>
    </div>
    <div id="chatArea">
        <div class="empty-state">
            <div style="font-size:40px;margin-bottom:12px;">💬</div>
            <div>経営計画書を読み込んでいます...</div>
        </div>
    </div>
    <div class="tmpl-row">
        <button class="tmpl-btn" onclick="setQ('手当や給与について知りたい')">手当</button>
        <button class="tmpl-btn" onclick="setQ('採用や人材育成について教えてください')">採用・人材</button>
        <button class="tmpl-btn" onclick="setQ('クレーム対応の方針を知りたい')">クレーム</button>
        <button class="tmpl-btn" onclick="setQ('休暇や働き方について知りたい')">休暇・働き方</button>
        <button class="tmpl-btn" onclick="setQ('賞与の基準について知りたい')">賞与</button>
        <button class="tmpl-btn" onclick="setQ('経営方針について知りたい')">経営方針</button>
    </div>
    <div class="input-row">
        <textarea id="situation" placeholder="質問を入力..."
            oninput="this.style.height='44px';this.style.height=Math.min(this.scrollHeight,120)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
        <button id="sendBtn" onclick="send()">&#10148;</button>
    </div>
    <div class="reset-row">
        <button class="reset-btn" onclick="resetChat()">会話をリセット</button>
    </div>
</div>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzU2GU6Zdhj8wQKibVoqz8Q64Mh_xptJDLdAY5fjwlw5v1xC5RHKf5mhG4yISX6hkXC/exec';
    const STORAGE_KEY = 'solon_doc_text';
    const STORAGE_DATE_KEY = 'solon_doc_date';
    let docText = '';
    let conv = [];
    let msgs = [];
    const area = document.getElementById('chatArea');
    function getApiKey() { return localStorage.getItem('solon_api_key') || ''; }
    // GAS経由でGoogle Docsを読み込む
    async function fetchDoc() {
        const res = await fetch(GAS_URL);
        const json = await res.json();
        if (json.text && json.text.length > 200) {
            return json.text;
        }
        throw new Error('データ取得失敗');
    }
    // 初回または更新ボタン押下時に読み込む
    async function loadDoc(forceUpdate = false) {
        const saved = localStorage.getItem(STORAGE_KEY);
        const savedDate = localStorage.getItem(STORAGE_DATE_KEY);
        // 保存済みデータがあれば即座に使用
        if (saved && saved.length > 200 && !forceUpdate) {
            docText = saved;
            const date = savedDate ? new Date(savedDate).toLocaleDateString('ja-JP') : '不明';
            document.getElementById('docStatus').textContent = `✅ 読み込み済（${date}）`;
            renderMsgs();
            return;
        }
        // GASから取得
        document.getElementById('docStatus').textContent = '📄 最新データを取得中...';
        try {
            const text = await fetchDoc();
            docText = text;
            localStorage.setItem(STORAGE_KEY, text);
            localStorage.setItem(STORAGE_DATE_KEY, new Date().toISOString());
            document.getElementById('docStatus').textContent = `✅ 読み込み完了（${new Date().toLocaleDateString('ja-JP')}）`;
            renderMsgs();
        } catch(e) {
            document.getElementById('docStatus').textContent = '⚠️ 読み込みエラー';
            if (!saved) {
                area.innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">⚠️</div><div>読み込みに失敗しました。<br>「🔄 更新」ボタンを押してください。</div></div>';
            } else {
                docText = saved;
                renderMsgs();
            }
        }
    }
    // 更新ボタン
    async function updateDoc() {
        await loadDoc(true);
    }
    // 質問に関連する部分だけを抽出
    function getRelevantChunk(question) {
        if (!docText) return '';
        // 質問から2文字以上の単語を抽出
        const qWords = [];
        for (let i = 0; i < question.length - 1; i++) {
            qWords.push(question.slice(i, i + 2));
        }
        // docTextを500文字ずつのチャンクに分割
        const chunkSize = 500;
        const overlap = 100;
        const chunks = [];
        for (let i = 0; i < docText.length; i += chunkSize - overlap) {
            chunks.push(docText.slice(i, i + chunkSize));
        }
        // 各チャンクのスコアを計算
        const scored = chunks.map((chunk, idx) => {
            const score = qWords.filter(w => chunk.includes(w)).length;
            return { chunk, score, idx };
        });
        // スコアの高い順に並び替えて上位3チャンクを結合
        const top = scored
            .filter(s => s.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 3)
            .sort((a, b) => a.idx - b.idx)
            .map(s => s.chunk);
        if (top.length > 0) {
            return top.join('\n').slice(0, 3000);
        }
        return docText.slice(0, 3000);
    }
    function setQ(text) {
        document.getElementById('situation').value = text;
        document.getElementById('situation').focus();
    }
    function renderMsgs() {
        if (!msgs.length) {
            area.innerHTML = '<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">💬</div><div>下の入力欄から質問してください</div></div>';
            return;
        }
        area.innerHTML = msgs.map((m, i) => {
            if (m.role === 'user') return `<div id="msg-${i}" style="display:flex;justify-content:flex-end;margin-bottom:12px;"><div style="background:#4F46E5;color:white;padding:10px 14px;border-radius:18px 18px 4px 18px;max-width:80%;font-size:14px;line-height:1.6;">${esc(m.text)}</div></div>`;
            if (m.role === 'assistant') return `<div id="msg-${i}" style="display:flex;margin-bottom:12px;gap:8px;"><div style="width:32px;height:32px;background:#4F46E5;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;flex-shrink:0;">社</div><div style="background:white;border:1px solid #E5E7EB;padding:10px 14px;border-radius:18px 18px 18px 4px;max-width:80%;font-size:14px;line-height:1.8;word-wrap:break-word;">${fmt(m.text)}</div></div>`;
            return `<div style="text-align:center;color:#EF4444;font-size:12px;margin:8px 0;">${esc(m.text)}</div>`;
        }).join('');
    }
    async function send() {
        if (!docText) { alert('経営計画書の読み込みが完了していません。'); return; }
        const el = document.getElementById('situation');
        const q = el.value.trim();
        if (!q) return;
        let apiKey = getApiKey();
        if (!apiKey) {
            const key = prompt('初回設定：APIキーを入力してください\n（sk-ant- で始まる文字列）');
            if (!key || !key.startsWith('sk-ant-')) { alert('APIキーが正しくありません。'); return; }
            localStorage.setItem('solon_api_key', key);
            apiKey = key;
        }
        el.value = '';
        el.style.height = '44px';
        msgs.push({ role: 'user', text: q });
        conv.push({ role: 'user', content: q });
        renderMsgs();
        setTimeout(() => { area.scrollTop = area.scrollHeight; }, 30);
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳';
        try {
            const chunk = getRelevantChunk(q);
            const recentConv = conv.slice(-6);
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 800,
                    system: `あなたは株式会社ソロンの社長・平川浩美です。以下の経営計画書に基づいて、社員の質問に正確に答えてください。
回答のルール：
・200文字以内で簡潔に答える
・数字は正確に伝える
・#や*などのマークダウン記号は使わない
・箇条書きは「・」を使う
・文末に「：」は使わない
・詳細を聞かれたら追加で答える
【経営計画書】
${chunk}`,
                    messages: recentConv
                })
            });
            if (!res.ok) {
                let errMsg = 'エラー';
                try { const e = await res.json(); errMsg = e.error?.message || errMsg; } catch(_) {}
                if (res.status === 404) {
                    errMsg = 'AIモデルが見つかりません（404）。APIキーまたはモデル名をご確認ください。';
                } else if (res.status === 401) {
                    errMsg = 'APIキーが正しくありません（401）。';
                    localStorage.removeItem('solon_api_key');
                }
                throw new Error(errMsg);
            }
            const data = await res.json();
            const answer = data.content[0].text;
            conv.push({ role: 'assistant', content: answer });
            msgs.push({ role: 'assistant', text: answer });
            renderMsgs();
        } catch(e) {
            msgs.push({ role: 'error', text: 'エラー: ' + e.message });
            renderMsgs();
        } finally {
            btn.disabled = false;
            btn.innerHTML = '&#10148;';
        }
    }
    function resetChat() {
        if (confirm('会話をリセットしますか？')) { conv = []; msgs = []; renderMsgs(); }
    }
    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function fmt(t) {
        return esc(t)
            .replace(/#{1,6}\s?/g, '')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '$1')
            .replace(/`(.*?)`/g, '$1')
            .replace(/：<br>/g, '<br>')
            .replace(/：$/g, '')
            .replace(/\n/g, '<br>');
    }
    loadDoc();
</script>
</body>
</html>
